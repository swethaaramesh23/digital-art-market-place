<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 20px;
            position: relative;
            z-index: 10;
        }
        .auth-box {
            width: 100%;
            max-width: 350px;
            padding: 25px;
            text-align: center;
        }
        .auth-box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .auth-box p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 40px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            
            cursor: pointer;
            color: var(--text-secondary);
        }
        .auth-link {
            color: var(--accent-neon-blue);
            text-decoration: none;
            transition: color 0.3s;
        }
        .auth-link:hover {
            color: var(--accent-purple);
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .btn-loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <style id="form-responsive-fixes">
        .form-group input { width: 100%; padding: 15px 40px; box-sizing: border-box; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 2; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 2; }
        .radio-group, .checkbox-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .radio-group label, .checkbox-group label { display: flex; align-items: center; gap: 5px; }
        .btn-full { width: 100%; }
        @media (max-width: 480px) {
            .glass-card { padding: 20px !important; }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <header>
        <div class="container navbar">
            
                        <a href="index.html" class="logo">
                <img loading="lazy" src="lo1.webp" alt="Stackly Logo">
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="marketplace.html">Explore</a>
                <a href="artists.html">Artists</a>
                <a href="collections.html">Collections</a>
                <a href="about.html">About</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Contact</a>
                  <a href="login.html" class="mobile-auth">Login to Account</a>
                  <a href="signup.html" class="mobile-auth" style="color: var(--accent-neon-blue);">Create Account</a>
              </nav>
            <div class="nav-actions">
                <button class="btn btn-icon btn-glass" id="theme-toggle" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="login.html" class="btn btn-glass magnetic active">Login</a>
                <a href="signup.html" class="btn btn-primary magnetic">Sign Up</a>
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>
    
    <div class="auth-container">
        <div class="glass-card auth-box gsap-reveal">
            
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your account</p>

            <div id="loginForm" class="form-wrapper" style="width:100%;">
                <div class="form-group input-group">
                    <input type="email" id="email" required>
                    <label for="email">Email Address</label>
                </div>
                
                                <div class="form-group" style="margin-bottom: 25px; text-align: left;">
                    <label style="display: block; color: var(--text-secondary); margin-bottom: 10px; font-size: 0.9rem;">Login As</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; color: #fff;"><input type="radio" name="role" value="collector" checked> Collector</label>
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; color: #fff;"><input type="radio" name="role" value="artist"> Artist / Creator</label>
                    </div>
                </div>
                <div class="form-group input-group">
                    <input type="text" style="-webkit-text-security: disc; text-security: disc;" id="password" required>
                    <label for="password">Password</label>
                    <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                </div>

                <div class="auth-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember"> Remember Me
                    </label>
                    <a href="forgot-password.html" class="auth-link">Forgot Password?</a>
                </div>

                <button type="button" class="btn btn-primary magnetic" style="width: 100%; margin-bottom: 20px;" id="loginBtn">
                    <span>Login to Dashboard</span>
                </button>
                
                <div style="display: flex; align-items: center; text-align: center; margin-bottom: 20px;">
                    <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
                    <span style="padding: 0 10px; color: var(--text-secondary); font-size: 0.8rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
                </div>

                <button type="button" class="btn btn-glass magnetic" style="width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; ">
                    <img loading="lazy" src="image-digi/google-logo.svg" alt="Google" style="width: 20px; height: 20px;">
                    <span>Continue with Google</span>
                </button>

                <p style="margin-bottom: 0;">Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEQSQBxgGviWaiEa424G4+A3rA82Rk3F2L7y/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            // Basic Validation
            if (!email || !pass) {
                alert('Please fill in all fields');
                return;
            }

            // Loading state
            btn.classList.add('btn-loading');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch"></i> Authenticating...';

            setTimeout(() => {
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<span>Login to Dashboard</span>';
                
                // Set Auth token so the dashboard doesn't kick the user out
                localStorage.setItem('stackly_auth', 'true');
                const username = email.split('@')[0];
                localStorage.setItem('stackly_user', username);
                
                // Redirect based on role
                if(role === 'artist') {
                    window.location.href = 'artist-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            }, 1000);
            return false;
        }
    </script>
</body>
</html>
