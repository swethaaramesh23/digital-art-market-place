<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Stackly</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .auth-box {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }
        .auth-box h1 { font-size: 2rem; margin-bottom: 10px; }
        .auth-box p { color: var(--text-secondary); margin-bottom: 30px; }
        .auth-link { color: var(--accent-neon-blue); text-decoration: none; transition: color 0.3s; font-size: 0.9rem; }
        .auth-link:hover { color: var(--accent-purple); }
        .btn-loading { pointer-events: none; opacity: 0.8; }
        .btn-loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
    </div>
    
    <div class="auth-container">
        <div class="glass-card auth-box gsap-reveal">
            <a href="index.html" class="logo" style="display: inline-block; margin-bottom: 20px;">
                <img src="lo1.webp" alt="Stackly Logo" style="width: 40px; height: 40px; border-radius: 50%;">
            </a>
            <h1 id="titleText">Reset Password</h1>
            <p id="descText">Enter your email address and we'll send you a link to reset your password.</p>

            <form id="forgotForm" onsubmit="handleReset(event)">
                <div class="form-group input-group" style="text-align: left; margin-bottom: 20px;">
                    <input type="email" id="email" required placeholder="name@example.com">
                    <label for="email">Email Address</label>
                </div>

                <button type="submit" class="btn btn-primary magnetic" style="width: 100%; margin-bottom: 20px;" id="resetBtn">
                    <span>Send Reset Link</span>
                </button>

                <p style="margin-bottom: 0;"><i class="fa-solid fa-arrow-left"></i> <a href="login.html" class="auth-link">Back to Login</a></p>
            </form>
            
            <div id="successState" style="display: none; padding: 20px 0;">
                <i class="fa-solid fa-envelope-circle-check" style="font-size: 4rem; color: #00ff00; margin-bottom: 20px;"></i>
                <h3>Check your email</h3>
                <p class="text-secondary" style="margin-bottom: 30px;">We've sent a password reset link to your email address.</p>
                <a href="login.html" class="btn btn-glass magnetic" style="width: 100%;">Return to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script>
        function handleReset(e) {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const email = document.getElementById('email').value;

            // Loading state
            btn.classList.add('btn-loading');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch"></i> Sending...';

            setTimeout(() => {
                showToast('Reset link sent successfully!', 'success');
                
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('titleText').style.display = 'none';
                document.getElementById('descText').style.display = 'none';
                document.getElementById('successState').style.display = 'block';
            }, 1500);
        }
    </script>
</body>
</html>
